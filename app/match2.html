<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.png">
    <title>FlagMag App</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">


    <!-- Plugins & Custom CSS -->
    <link rel="stylesheet" href="assets/css/fontawesome_6.6.0.min.css">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/jquery.fancybox.min.css">
    <link rel="stylesheet" href="assets/css/owl.carousel.min.css">
    <link rel="stylesheet" href="assets/css/owl.theme.default.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <div class="wrapper">

       <div class="main-section-wrapper stats-managment">

            <div class="content-wrapper">

                <header class="header">
                    <div class="row justify-content-between align-items-center">
                        <div class="col-auto">
                            <nav class="navbar">
                                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                                <!-- <span class="navbar-toggler-icon"></span> -->
                                    <img src="assets/images/menu-bar.png" alt="">
                                </button>
                                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                                    <ul class="navbar-nav">
                                        <li class="nav-item">
                                        <a class="nav-link" href="#">Home</a>
                                        </li>
                                        <li class="nav-item">
                                        <a class="nav-link" href="#">Team</a>
                                        </li>
                                        <li class="nav-item">
                                        <a class="nav-link" href="#">Match</a>
                                        </li>
                                    </ul>
                                </div>
                            </nav>
                        </div>
                        <div class="col-auto profile-area">
                            <div class="profile-edit">
                                <a href="#"><img src="assets/images/profile-edit.png" alt=""></a>
                            </div>
                            <div class="profile-image">
                                <img src="assets/images/profile1.png" alt="">
                            </div>
                        </div>
                    </div>
                </header>



                <div class="live-match-wrapper">
                    <div class="top">
                        <div class="team-box">
                            <h5>White Squad</h5>
                            <div class="image-area">
                                <img src="assets/images/team1.png" alt="">
                            </div>
                            <h4>0-1</h4>
                            <div class="progress-area">
                                <div class="progress" role="progressbar" aria-label="Basic example" aria-valuenow="33" aria-valuemin="0" aria-valuemax="100">
                                    <div class="progress-bar" style="width: 33%"></div>
                                </div>
                                <div class="progress-label">
                                    <span>L:1</span>
                                    <span>L:3</span>
                                </div>
                            </div>
                        </div>

                        <div class="team-score">
                            <div class="logo">
                                <img src="assets/images/logo.png" alt="">
                            </div>
                            <h3><span>28</span>:<span>42</span></h3>
                            <h6>Score</h6>
                        </div>

                        <div class="team-box">
                            <h5>Red Squad</h5>
                            <div class="image-area">
                                <img src="assets/images/team2.png" alt="">
                            </div>
                            <h4>0-1</h4>
                            <div class="progress-area">
                                <div class="progress" role="progressbar" aria-label="Basic example" aria-valuenow="33" aria-valuemin="0" aria-valuemax="100">
                                    <div class="progress-bar" style="width: 33%"></div>
                                </div>
                                <div class="progress-label">
                                    <span>L:1</span>
                                    <span>L:3</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="info-text">
                        <div class="text">
                            Round : <span>3rd</span>
                        </div>
                        <div class="text">
                            Drive : <span>1 Half</span>
                        </div>
                        <div class="text">
                            No : <span>20 # 20</span>
                        </div>
                    </div>

                    <div class="drive-area">
                        <div class="drive-box">
                            <button><img src="assets/images/spin1.png" alt=""></button>
                            <h6>Drive : <span>10</span></h6>
                            <button><img src="assets/images/spin2.png" alt=""></button>
                        </div>
                    </div>
                </div>


                <div class="managment-box-area">

                    <div class="control-box">
                        <img src="assets/images/icon-qb.png" alt="">
                        <h6>change qB</h6>
                    </div>

                    <div class="control-box">
                        <img src="assets/images/icon-run.png" alt="">
                        <h6>Run</h6>
                    </div>

                    <div class="control-box">
                        <img src="assets/images/icon-completion.png" alt="">
                        <h6>completion</h6>
                    </div>

                    <div class="control-box">
                        <img src="assets/images/icon-incompletion.png" alt="">
                        <h6>incompletion</h6>
                    </div>
                
                    <div class="control-box">
                        <img src="assets/images/icon-interception.png" alt="">
                        <h6>interception</h6>
                    </div>
                    
                    <div class="control-box">
                        <img src="assets/images/icon-sack.png" alt="">
                        <h6>sack</h6>
                    </div>

                </div>








            </div>



            <footer>
                <ul>
                    <li><a href="#"><img src="assets/images/icon-reply.png" alt=""></a></li>
                    <li><a href="#"><img src="assets/images/icon-info.png" alt=""></a></li>
                    <li><a href="#"><img src="assets/images/icon-start.png" alt=""></a></li>
                    <li><a href="#"><img src="assets/images/icon-tick.png" alt=""></a></li>
                    <li><a href="#"><img src="assets/images/icon-reload.png" alt=""></a></li>
                </ul>
            </footer>
            
       </div>

    </div>


    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/jquery.fancybox.min.js"></script>
    <script src="assets/js/owl.carousel.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/custom.js"></script>

</body>






</html>
