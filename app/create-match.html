<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.png">
    <title>FlagMag App</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">


    <!-- Plugins & Custom CSS -->
    <link rel="stylesheet" href="assets/css/fontawesome_6.6.0.min.css">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/jquery.fancybox.min.css">
    <link rel="stylesheet" href="assets/css/owl.carousel.min.css">
    <link rel="stylesheet" href="assets/css/owl.theme.default.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <div class="wrapper">


       <div class="main-section-wrapper create-match">

            <div class="content-wrapper">

                <header>
                    <div class="back-btn-area">
                        <a href="#"><i class="fa-solid fa-arrow-left"></i></a> <span>Create Match</span>
                    </div>
                </header>


                <div class="create-match-area">
                    <div class="form-group">
                        <label for="t1">Team 1</label>
                        <select name="" id="t1" class="select-form-control form-control">
                            <option value="">Option 1</option>
                            <option value="">Option 2</option>
                            <option value="">Option 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="t2">Team 2</label>
                        <select name="" id="t2" class="select-form-control form-control">
                            <option value="">Option 1</option>
                            <option value="">Option 2</option>
                            <option value="">Option 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="t3">Location</label>
                        <select name="" id="t3" class="select-form-control form-control">
                            <option value="">Option 1</option>
                            <option value="">Option 2</option>
                            <option value="">Option 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="t4">State</label>
                        <select name="" id="t4" class="select-form-control form-control">
                            <option value="">Option 1</option>
                            <option value="">Option 2</option>
                            <option value="">Option 3</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-6">
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" name="" id="" placeholder="MM/DD/YYYY" class="form-control">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-group">
                                <label>Time</label>
                                <input type="time" name="" id="" placeholder="HH:MM" class="form-control">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="t5">Tournament / League</label>
                        <select name="" id="t5" class="select-form-control form-control">
                            <option value="">Option 1</option>
                            <option value="">Option 2</option>
                            <option value="">Option 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Referee</label>
                        <input type="date" name="" id="" placeholder="Justin Blake" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <input type="date" name="" id="" placeholder="Add any notes..." class="form-control">
                    </div>

                    <input type="submit" class="btn btn-primary w-100" value="Create Match">
                    <h6><a href="#">Cancel</a></h6>
                </div>

            </div>
            
       </div>

    </div>


    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/jquery.fancybox.min.js"></script>
    <script src="assets/js/owl.carousel.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/custom.js"></script>

</body>






</html>
