<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.png">
    <title>FlagMag App</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">


    <!-- Plugins & Custom CSS -->
    <link rel="stylesheet" href="assets/css/fontawesome_6.6.0.min.css">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/jquery.fancybox.min.css">
    <link rel="stylesheet" href="assets/css/owl.carousel.min.css">
    <link rel="stylesheet" href="assets/css/owl.theme.default.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <div class="wrapper">


       <div class="main-section-wrapper login-page login2">

            <div class="content-wrapper">

                <header>
                    <div class="back-btn-area">
                        <a href="#"><i class="fa-solid fa-arrow-left"></i></a>
                    </div>
                </header>
                <div class="content-area">
                    <h2>We say Hello!</h2>
                    <p>Lorem Ipsum is simply dummy text of the printing and typesetting industry.</p>
                </div>

                <div class="form-area">
                    <input type="email" class="form-control email" placeholder="Email">
                    <div class="input-group password-group">
                        <input type="password" class="form-control password-input password" placeholder="Password">
                        <button type="button" class="toggle-password">
                            <i class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>
                    <span class="forgot-pass"><a href="#">Forgot password?</a></span>
                    <input type="submit" class="btn btn-primary" value="Log In">
                </div>

                <div class="social-login-area">
                    <h5>or log in with </h5>
                    <ul>
                        <li><a href="#"><img src="assets/images/fb.png" alt=""></a></li>
                        <li><a href="#"><img src="assets/images/go.png" alt=""></a></li>
                    </ul>
                </div>

                <h6>Don’t have an account? <a href="#">Sign Up</a></h6>

            </div>
            
       </div>



    </div>


    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/jquery.fancybox.min.js"></script>
    <script src="assets/js/owl.carousel.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/custom.js"></script>

</body>



</html>
